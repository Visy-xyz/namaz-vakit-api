name: Yearly Prayer Times Refresh

on:
  # Every January 1 at 02:00 UTC
  schedule:
    - cron: '0 2 1 1 *'

  # Manual trigger
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip fetch (only test email notification)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch prayer times
        if: ${{ inputs.dry_run != true }}
        env:
          DIYANET_EMAIL: ${{ secrets.DIYANET_EMAIL }}
          DIYANET_PASS: ${{ secrets.DIYANET_PASS }}
        run: |
          if [ -f countries-all.json ] || [ -f countries.json ]; then
            echo "Using scripts/fetch-europe.mjs (countries-all.json or countries.json present)"
            node scripts/fetch-europe.mjs
          else
            echo "No country list JSON — using scripts/fetch-yearly.mjs (hardcoded city list)"
            node scripts/fetch-yearly.mjs
          fi

      - name: Build prayer catalog
        if: ${{ inputs.dry_run != true }}
        run: node scripts/build-prayer-catalog.mjs

      - name: Verify data integrity
        if: ${{ inputs.dry_run != true }}
        run: node scripts/verify.mjs

      - name: Commit new data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh prayer times ${{ github.run_number }}"
          file_pattern: |
            data/**/*.json
            generated/prayer-catalog.json

  notify:
    name: Email notification
    runs-on: ubuntu-latest
    needs: refresh
    if: always()
    steps:
      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.NOTIFY_EMAIL_USER }}
          password: ${{ secrets.NOTIFY_EMAIL_PASS }}
          to: ${{ secrets.NOTIFY_EMAIL_USER }}
          from: Namaz Vakit API <${{ secrets.NOTIFY_EMAIL_USER }}>
          subject: >
            ${{ needs.refresh.result == 'success' && '✅ [Namaz Vakit] Oraret u rifreskuan per vitin e ri!' || '❌ [Namaz Vakit] GABIM - Rifreskimi deshtoi!' }}
          body: |
            ${{ needs.refresh.result == 'success' && '✅ SUKSES' || '❌ DESHTIM' }}

            ${{ needs.refresh.result == 'success' && 'Te dhenat e koheve te namazit u rifreskuan me sukses per vitin e ri. Aplikacioni eshte gati.' || 'Rifreskimi i te dhenave DESHTOI. Hyr ne GitHub dhe kontrollo se cfare ndodhi. Perdoruesit mund te shohin te dhena te vjetra!' }}

            ─────────────────────────
            Kur:     1 Janar  (automatik)
            Status:  ${{ needs.refresh.result == 'success' && 'U krye me sukses' || 'DESHTOI - duhet nderhyrje' }}
            ─────────────────────────

            ${{ needs.refresh.result != 'success' && 'SHKO TANI: ' || 'Detajet: ' }}https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
