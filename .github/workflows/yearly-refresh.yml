name: Yearly Prayer Times Refresh

on:
  # Çdo 1 Janar ora 02:00 UTC
  schedule:
    - cron: '0 2 1 1 *'

  # Manual trigger — mund ta ekzekutosh edhe tani për herë të parë
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run fetch script
        env:
          DIYANET_EMAIL: ${{ secrets.DIYANET_EMAIL }}
          DIYANET_PASS:  ${{ secrets.DIYANET_PASS }}
        run: node scripts/fetch-yearly.mjs

      - name: Commit new data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh prayer times ${{ github.run_number }}"
          file_pattern: 'data/**/*.json'
